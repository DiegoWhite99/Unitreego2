<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daiver - Tu Perro Robot</title>
    <link rel="stylesheet" href="css/landing.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <img src="/website/assets/images/diver.png" alt="diver">
                <h1>Diver</h1>
            </div>
            <div id="status-badge" class="status-badge offline">
                <span class="status-dot"></span>
                <span id="status-text">Sin conexion</span>
            </div>
        </div>
    </header>

    <!-- Hero / Imagen Unitree -->
    <section class="hero-section">
        <div class="hero-container">
            <div class="hero-image">
                <img src="img/unitree-go2.png" alt="Unitree Go2" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="hero-image-fallback">🤖🐕</div>
            </div>
            <p class="hero-phrase">Interactua conmigo! Familia CUN</p>
        </div>
    </section>

    <!-- Voice Section -->
    <section class="voice-section">
        <div class="quick-phrases">
            <button class="phrase-btn" data-phrase="Hola! Soy Daiver, tu perro robot favorito!">👋 Hola!</button>
            <button class="phrase-btn" data-phrase="Me encanta jugar contigo!">🎉 Jugar!</button>
            <button class="phrase-btn" data-phrase="Mira lo que puedo hacer!">✨ Mira!</button>
            <button class="phrase-btn" data-phrase="Estoy muy feliz de verte!">😊 Feliz!</button>
            <button class="phrase-btn" data-phrase="Soy un robot muy inteligente, estudio en la CUN!">🎓 CUN!</button>
            <button class="phrase-btn" data-phrase="Quieres ver mi baile? Mirame!">💃 Baile!</button>
            <button class="phrase-btn" data-phrase="Gracias por visitarnos! Vuelve pronto!">🙏 Gracias!</button>
            <button class="phrase-btn" data-phrase="Te quiero mucho! Mira mi corazon!">💖 Te quiero!</button>
        </div>
    </section>

    <!-- Main Actions -->
    <main class="actions-main">
        <h2 class="actions-title">Mi Tablero De Funciones</h2>

        <!-- Posturas Basicas -->
        <div class="action-category">
            <h3 class="category-title">🦴 Posturas</h3>
            <div class="action-grid">
                <button class="action-btn" data-action="stand" data-voice="Estoy de pie y listo para jugar!">
                    <img class="pie" src="/website/assets/images/pie.png" alt="robot de pie">
                    <span class="action-label">De Pie</span>
                </button>

                <button class="action-btn" data-action="sit" data-voice="Me siento como un buen perrito!">
                    <img class="pie" src="/website/assets/images/sentado.png" alt="robot de pie">
                    <span class="action-label">Sentarse</span>
                </button>

                <button class="action-btn" data-action="rise" data-voice="Me levanto! Vamos a jugar!">
                    <img class="pie" src="/website/assets/images/levantarse.png" alt="robot de pie">
                    <span class="action-label">Levantarse</span>
                </button>

                <button class="action-btn" data-action="recovery" data-voice="Me recupero! Estoy bien!">
                    <img class="pie" src="/website/assets/images/recuperarse.png" alt="robot de pie">
                    <span class="action-label">Recuperarse</span>
                </button>
            </div>
        </div>

        <!-- Saludos y Gestos -->
        <div class="action-category">
            <h3 class="category-title">👋 Saludos y Gestos</h3>
            <div class="action-grid">
                <button class="action-btn action-featured" data-action="hello" data-voice="Hola! Mucho gusto! Soy Daiver!">
                    <img class="pie" src="/website/assets/images/patica.png" alt="robot de pie">
                    <span class="action-label">Dar la Pata</span>
                </button>

                <button class="action-btn action-featured" data-action="heart" data-voice="Te quiero mucho! Mira mi corazoncito!">
                    <img class="pie" src="/website/assets/images/corazon.png" alt="robot de pie">
                    <span class="action-label">Corazon</span>
                </button>
            </div>
        </div>

        <!-- Emergencia -->
        <div class="action-category">
            <div class="emergency-zone">
                <button id="btn-emergency" class="btn-emergency" data-voice="Parada de emergencia activada. Me detengo.">
                    🛑 PARADA DE EMERGENCIA
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>🐕 Daiver — Unitree Go2 Air | CUN - Laboratorio 2</p>
    </footer>

    <!-- Socket.IO (local) -->
    <script src="js/socket.io.min.js"></script>

    <!-- Landing Scripts -->
    <script src="js/landing.js"></script>
</body>
</html>
